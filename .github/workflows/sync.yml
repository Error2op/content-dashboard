name: Sync YouTube Data

on:
  schedule:
    # Run every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debug env vars
        run: |
          echo "TURSO_DATABASE_URL is set: ${{ secrets.TURSO_DATABASE_URL != '' }}"
          echo "TURSO_AUTH_TOKEN is set: ${{ secrets.TURSO_AUTH_TOKEN != '' }}"
          echo "YOUTUBE_API_KEY is set: ${{ secrets.YOUTUBE_API_KEY != '' }}"
          echo "TURSO_DATABASE_URL starts with: $(echo $TURSO_DATABASE_URL | cut -c1-20)..."
          echo "TURSO_AUTH_TOKEN starts with: $(echo $TURSO_AUTH_TOKEN | cut -c1-15)..."
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Test YouTube API key
        run: |
          curl -s "https://www.googleapis.com/youtube/v3/channels?part=snippet&forHandle=MrBeast&key=$YOUTUBE_API_KEY" | head -c 200
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Test Turso connection
        run: |
          node -e "
          const { createClient } = require('@libsql/client');
          const client = createClient({
            url: process.env.TURSO_DATABASE_URL,
            authToken: process.env.TURSO_AUTH_TOKEN,
          });
          client.execute('SELECT 1 AS test')
            .then(r => console.log('Turso OK:', JSON.stringify(r.rows)))
            .catch(e => console.error('Turso FAIL:', e.message, e.cause?.message));
          "
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Sync all channels
        run: npx tsx scripts/sync.ts
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}