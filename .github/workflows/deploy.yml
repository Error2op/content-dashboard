name: Deploy to Cloudflare Workers

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with OpenNext
        run: |
          npx opennextjs-cloudflare build
          cp .open-next/worker.js .open-next/cloudflare/_worker.js
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Create Pages deployment
        run: |
          cd .open-next/cloudflare

          # Create deployment via Pages API
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $CLOUD...EN" \
            -H "Content-Type: application/json" \
            -d '{"branch":"production","production_branch":"master"}' \
            "https://api.cloudflare.com/client/v4/accounts/af6e0e1df24c966076169fca50cb29e8/pages/projects/content-dashboard/deployments")

          echo "Create response: $RESP"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy via wrangler (account from config)
        run: npx wrangler pages deploy .open-next/cloudflare --project-name=content-dashboard --account-id=af6e0e1df24c966076169fca50cb29e8
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}