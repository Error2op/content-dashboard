name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Cloudflare Pages handles builds automatically via Git integration.
# This workflow is only needed if you want manual deploy control.
# To use: connect the GitHub repo in Cloudflare Pages dashboard,
# set build command to: npx opennextjs-cloudflare build
# set output directory to: .open-next/cloudflare

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with OpenNext
        run: npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy .open-next/cloudflare --project-name=content-dashboard
