name: Deploy to Cloudflare Workers

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with OpenNext
        run: npx opennextjs-cloudflare build
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Bundle all static assets into cloudflare directory
        run: |
          # Copy actual Next.js static assets (JS chunks, CSS, images) into cloudflare dir
          # so wrangler uploads them as static assets
          echo "=== Before copy ==="
          find .open-next/cloudflare -type f | wc -l
          echo "=== assets/ _next ==="
          find .open-next/assets/_next -type f 2>/dev/null | wc -l
          echo ""
          # Copy static assets into cloudflare dir for wrangler to pick up
          cp -r .open-next/assets/. .open-next/cloudflare/ 2>/dev/null || true
          echo "=== After copy ==="
          find .open-next/cloudflare -type f | wc -l

      - name: Deploy with OpenNext
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: af6e0e1df24c966076169fca50cb29e8